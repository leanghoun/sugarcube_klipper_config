# This file contains common pin mappings for the Fysetc Spider H7 board.
# To use this config, the firmware should be compiled for the STM32H723.
# When calling "menuconfig", enable "extra low-level configuration setup"
# and select the "25MHz crystal" as clock reference
# For flashing, No bootloader, write the compiled klipper.bin to memory location 0x08000000

# https://canbus.esoterical.online/mainboard_flashing/common_hardware/Fysetc%20Spider%20v3.0%20H7/README.html

# See docs/Config_Reference.md for a description of parameters.

## *** THINGS TO CHANGE/CHECK: ***
## MCU paths							[mcu] section
## Thermistor types						[extruder] and [heater_bed] sections - See 'sensor types' list at end of file
## Z Endstop Switch location			[safe_z_home] section
## Homing end position                  [gcode_macro G32] section
## Z Endstop Switch  offset for Z0		[stepper_z] section
## Probe points							[quad_gantry_level] section
## Min & Max gantry corner postions		[quad_gantry_level] section
## PID tune								[extruder] and [heater_bed] sections
## Fine tune E steps					[extruder] section

[include mainsail.cfg]

[printer]
kinematics: corexy
max_velocity: 500  
max_accel: 8000			    #Max 4000
max_z_velocity: 15			#Max 15 for 12V TMC Drivers, can increase for 24V
max_z_accel: 350
square_corner_velocity: 5.0
## Recommended shaper_type_x = mzv, shaper_freq_x = 76.8 Hz
## To avoid too much smoothing with 'mzv', suggested max_accel <= 17400 mm/sec^2
## 
## Recommended shaper_type_y = mzv, shaper_freq_y = 57.2 Hz
## To avoid too much smoothing with 'mzv', suggested max_accel <= 9600 mm/sec^2

[mcu]
canbus_uuid=7ddd1dd43af4

[exclude_object]
[skew_correction]


#####################################################################
#       Toolhead
#####################################################################

# https://canbus.esoterical.online/toolhead_flashing/common_hardware/BigTreeTech%20EBB36%20V1.2/README.html

[mcu EBBCan]
canbus_uuid: 40ebe9d38311

[adxl345]
cs_pin: EBBCan: PB12
spi_bus: spi2_PB2_PB11_PB10
axes_map: x,y,z

[extruder]
step_pin: EBBCan: PD0
dir_pin: !EBBCan: PD1
enable_pin: !EBBCan: PD2
rotation_distance: 22.3387658        # <new_rotation_distance> = <previous_rotation_distance> * ( <actual_extrude_distance> / 100 )
                                     # 22.67895 * (98.5/100) = 22.3387658
gear_ratio: 50:10
microsteps: 16
full_steps_per_rotation: 200	     # 200 for 1.8 degree, 400 for 0.9 degree
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: EBBCan: PB13
sensor_type: ATC Semitec 104NT-4-R025H42G
sensor_pin: EBBCan: PA3
#control: pid
#pid_Kp: 21.527
#pid_Ki: 1.063
#pid_Kd: 108.982
min_temp: 0
max_temp: 300
pressure_advance: 0.036               #	Default 0.03 Try to keep pressure_advance below 1.0
pressure_advance_smooth_time: 0.030   #	Default is 0.040, leave stock, but Ellis uses 0.02

[tmc2209 extruder]
uart_pin: EBBCan: PA15
run_current: 0.430
stealthchop_threshold: 999999
sense_resistor: 0.110

[fan]
pin: EBBCan: PA1

[heater_fan hotend_fan]
pin: EBBCan: PA0
heater: extruder
heater_temp: 50.0
#tachometer_pin: ^EBBCan:PB9
#tachometer_ppr: 2
#tachometer_poll_interval: 0.0015

[neopixel hotend_rgb]
pin: EBBCan:PD3
chain_count: 3
color_order: GRBW
initial_RED: 0.0
initial_GREEN: 0.0
initial_BLUE: 0.0
initial_WHITE: 0.12


#####################################################################
#       Fan
#####################################################################

[heater_fan electronics_fan]
##	Controller fan - FAN2 Connector
pin: PB5
max_power: 1.0
kick_start_time: 0.5
heater: heater_bed
heater_temp: 45.0
fan_speed: 0.5

#[output_pin activity_led]
#pin: sb_combo_v2:PA4 #fan2

[fan_generic bed_fans]
##	Bed fans
pin: PA13
kick_start_time: 0.5


#####################################################################
#      X/Y Stepper Settings
#####################################################################

[stepper_x]
##	Connected to X-MOT (B Motor)
step_pin: PE11
dir_pin: PE10
enable_pin: !PE9
rotation_distance: 40
microsteps: 16
full_steps_per_rotation:200  #set to 400 for 0.9 degree stepper
endstop_pin: EBBCan:PB5
position_min: 0
position_endstop: 168
position_max: 169
homing_speed: 25   #Max 100
homing_retract_dist: 5
homing_positive_dir: true

##	Make sure to update below for your relevant driver (2208 or 2209)
[tmc5160 stepper_x]
cs_pin: PE7               # Chip-select pin for SPI
#spi_bus: spi1            # Or spi2/spi3 depending on your board
spi_software_sclk_pin = PE12
spi_software_mosi_pin = PE14
spi_software_miso_pin = PE13
run_current: 1.0
hold_current: 0.5
sense_resistor: 0.075     # Watterott uses 75mΩ
driver_TPFD: 0            # Default recommended
stealthchop_threshold: 0

[stepper_y]
##	Connected to Y-MOT (A Motor)
step_pin: PD8
dir_pin: PB12
enable_pin: !PD9
rotation_distance: 40
microsteps: 16
full_steps_per_rotation:200  #set to 400 for 0.9 degree stepper
endstop_pin: EBBCan:PB6
position_min: 0
position_endstop: 173
position_max: 173
homing_speed: 25  #Max 100
homing_retract_dist: 5
homing_positive_dir: true

##	Make sure to update below for your relevant driver (2208 or 2209)
[tmc5160 stepper_y]
cs_pin: PE15              # Chip-select pin for SPI
#spi_bus: spi1            # Or spi2/spi3 depending on your board
spi_software_sclk_pin = PE12
spi_software_mosi_pin = PE14
spi_software_miso_pin = PE13
run_current: 1.0
hold_current: 0.5
sense_resistor: 0.075     # Watterott uses 75mΩ
driver_TPFD: 0            # Default recommended
stealthchop_threshold: 0


#####################################################################
#   Z Stepper Settings
#####################################################################

##  In Z-MOT Position
##  Z0 Stepper - Front Left
[stepper_z]
step_pin: PD5
dir_pin: PD6
enable_pin: !PD4
rotation_distance: 40
gear_ratio: 80:16
microsteps: 16
##  In Z- Position
endstop_pin: probe:z_virtual_endstop
position_max: 175
position_min: -5
homing_speed: 8
second_homing_speed: 3
homing_retract_dist: 0

##	Make sure to update below for your relevant driver (2208 or 2209)
[tmc5160 stepper_z]
cs_pin: PD7               # Chip-select pin for SPI
#spi_bus: spi1            # Or spi2/spi3 depending on your board
spi_software_sclk_pin = PE12
spi_software_mosi_pin = PE14
spi_software_miso_pin = PE13
run_current: 1.0
hold_current: 0.5
sense_resistor: 0.075     # Watterott uses 75mΩ
driver_TPFD: 0            # Default recommended
stealthchop_threshold: 0

##	In E1-MOT Position
##	Z1 Stepper - Rear Center
[stepper_z1]
step_pin: PD14
dir_pin: !PD13
enable_pin: !PD15
rotation_distance: 40
gear_ratio: 80:16
microsteps: 16

##	Make sure to update below for your relevant driver (2208 or 2209)
[tmc5160 stepper_z1]
cs_pin: PD10              # Chip-select pin for SPI
#spi_bus: spi1            # Or spi2/spi3 depending on your board
spi_software_sclk_pin = PE12
spi_software_mosi_pin = PE14
spi_software_miso_pin = PE13
run_current: 1.0
hold_current: 0.5
sense_resistor: 0.075     # Watterott uses 75mΩ
driver_TPFD: 0            # Default recommended
stealthchop_threshold: 0

##	In E2-MOT Position
##  Z2 Stepper - Front Right
[stepper_z2]
step_pin: PE6
dir_pin: PC13
enable_pin: !PE5
rotation_distance: 40
gear_ratio: 80:16
microsteps: 16

##	Make sure to update below for your relevant driver (2208 or 2209)
[tmc5160 stepper_z2]
cs_pin: PC14              # Chip-select pin for SPI
#spi_bus: spi1            # Or spi2/spi3 depending on your board
spi_software_sclk_pin = PE12
spi_software_mosi_pin = PE14
spi_software_miso_pin = PE13
run_current: 1.0
hold_current: 0.5
sense_resistor: 0.075     # Watterott uses 75mΩ
driver_TPFD: 0            # Default recommended
stealthchop_threshold: 0


#####################################################################
#   Cartographer
#####################################################################

[mcu cartographer] # See https://www.klipper3d.org/Config_Reference.html#mcu
canbus_uuid: bb4371973aaa

[axis_twist_compensation]
calibrate_start_x: 15
#   Defines the minimum X coordinate of the calibration
#   This should be the X coordinate that positions the nozzle at the starting
#   calibration position.
calibrate_end_x: 154
#   Defines the maximum X coordinate of the calibration
#   This should be the X coordinate that positions the nozzle at the ending
#   calibration position.
calibrate_x: 85
#   Defines the Y coordinate of the calibration
#   This should be the Y coordinate that positions the nozzle during the
#   calibration process. This parameter is recommended to
#   be near the center of the bed

# For Y-axis twist compensation, specify the following parameters:
calibrate_start_y: 15
#   Defines the minimum Y coordinate of the calibration
#   This should be the Y coordinate that positions the nozzle at the starting
#   calibration position for the Y axis. This parameter must be provided if
#   compensating for Y axis twist.
calibrate_end_y: 158
#   Defines the maximum Y coordinate of the calibration
#   This should be the Y coordinate that positions the nozzle at the ending
#   calibration position for the Y axis. This parameter must be provided if
#   compensating for Y axis twist.
calibrate_y: 87
#   Defines the X coordinate of the calibration for Y axis twist compensation
#   This should be the X coordinate that positions the nozzle during the
#   calibration process for Y axis twist compensation. This parameter must be
#   provided and is recommended to be near the center of the bed.

[cartographer]
mcu: cartographer
x_offset: 0                           # This is the offset of your probe from the nozzle tip, to the centre of the coil.
y_offset: 25.378                      # This is the offset of your probe from the nozzle tip, to the centre of the coil.
verbose: yes

#[probe]
#pin:

[bed_mesh]
zero_reference_position: 84, 87       # The centre of your bed. 
speed: 300
horizontal_move_z: 3
mesh_min: 10, 31                       # The first probed coordinate, nearest to the origin. This coordinate is relative to the probe's location.
mesh_max: 158, 163                    # The probed coordinate farthest from the origin. This is not necessarily the last point probed, as the probing process occurs in a zig-zag fashion. As with mesh_min, this coordinate is relative to the probe's location.
probe_count: 15, 15
adaptive_margin: 10
mesh_pps: 0,0                         # Disable interpolation - mesh is probably dense enough

[temperature_sensor cartographer]
sensor_type: temperature_mcu
sensor_mcu: cartographer
min_temp: 5
max_temp: 105

[adxl345]
cs_pin: cartographer:PA3
spi_bus: spi1

[resonance_tester]
accel_chip: adxl345
probe_points:
    90, 90, 20                        # Fill out the blank with x and y coordinates where you want to run the resonance test.


#####################################################################
#   Bed Heater
#####################################################################

[heater_bed]
##	SSR Pin - In BED OUT position
heater_pin: PB4
sensor_type: Generic 3950
sensor_pin: PB0
max_power: 1
min_temp: 0
max_temp: 120
#control: pid
#pid_kp: 58.437
#pid_ki: 2.347
#pid_kd: 363.769

[idle_timeout]
timeout: 3600
gcode:
    M104 S0                           ; turn off hotend
    M140 S0                           ; turn off bed
    M106 S0                           ; turn off fan


#####################################################################
#	LED Control
#####################################################################

#[output_pin caselight ]
##  Chamber Lighting - In 5V-RGB Position
#pin: PD3
#pwm: true
#shutdown_value: 0
#value:100
#cycle_time: 0.01


#####################################################################
#	Homing and Gantry Adjustment Routines
#####################################################################

[idle_timeout]
timeout: 1800

[safe_z_home]
##	XY Location of the Z Endstop Switch
##	Update -10,-10 to the XY coordinates of your endstop pin 
##	(such as 157,305) after going through Z Endstop Pin
##	Location Definition step.
home_xy_position:84,59
speed:300  #100
z_hop:10
   
[z_tilt]
z_positions:
    -22, 4.5
    107, 205
    193, 4.5
points:
    5, 0
    84, 144
    164, 0

#--------------------------------------------------------------------
speed: 300
horizontal_move_z: 6
retries: 5
retry_tolerance: 0.0075


#####################################################################
#	MCU and Host Temperature
#####################################################################

[temperature_sensor main_mcu_temp]
sensor_type: temperature_mcu
min_temp: 0
max_temp: 150

[temperature_sensor can_mcu_temp]
sensor_type: temperature_mcu
sensor_mcu: EBBCan
min_temp: 0
max_temp: 150

[temperature_sensor host]
sensor_type: temperature_host
min_temp: 0
max_temp: 150


